name: Send due followups

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-followups:
    runs-on: ubuntu-latest
    steps:
      - name: Call followup endpoint
        run: |
          curl --fail --show-error --silent --retry 3 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_SEND_FOLLOWUPS_URL }}"
